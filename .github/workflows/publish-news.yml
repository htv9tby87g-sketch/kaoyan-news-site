name: Generate and publish news archive

on:
  push:
    branches:
      - main
  schedule:
    # Beijing 06:45, 07:15, 07:45, 08:15, 08:45 and 09:15.
    - cron: "45 22 * * *"
    - cron: "15,45 23 * * *"
    - cron: "15,45 0 * * *"
    - cron: "15 1 * * *"
    # Beijing 20:45, 21:15, 21:45 and 22:15.
    - cron: "45 12 * * *"
    - cron: "15,45 13 * * *"
    - cron: "15 14 * * *"
    # Beijing 00:30: recover any missing reports from the past 14 days.
    - cron: "30 16 * * *"
  workflow_dispatch:
    inputs:
      edition:
        description: Report to generate manually
        required: true
        default: morning
        type: choice
        options:
          - morning
          - evening

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: news-pages
  cancel-in-progress: false

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NEWS_DATA_DIR: published-data/news
    steps:
      - name: Check out archive
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Generate finalized report
        shell: bash
        run: |
          generate_with_retry() {
            local edition="$1"
            for attempt in 1 2 3; do
              echo "Generating ${edition} report (attempt ${attempt}/3)..."
              if node generate-report.mjs --edition "$edition" --prepare; then
                return 0
              fi
              if [ "$attempt" -lt 3 ]; then
                sleep $((attempt * 30))
              fi
            done
            return 1
          }

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            generate_with_retry "${{ inputs.edition }}"
          elif [ "${{ github.event_name }}" = "push" ]; then
            node generate-report.mjs --backfill --days 14
          else
            case "${{ github.event.schedule }}" in
              "45 22 * * *"|"15,45 23 * * *"|"15,45 0 * * *"|"15 1 * * *") generate_with_retry morning ;;
              "45 12 * * *"|"15,45 13 * * *"|"15 14 * * *") generate_with_retry evening ;;
              "30 16 * * *") node generate-report.mjs --backfill --days 14 ;;
              *) echo "Unknown schedule"; exit 1 ;;
            esac
          fi

      - name: Commit new finalized archives
        shell: bash
        run: |
          git config user.name "kaoyan-news-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add published-data/news
          if git diff --cached --quiet; then
            echo "No new archive files."
          else
            git commit -m "chore: publish finalized news archive"
            git push
          fi

      - name: Build static site
        run: node scripts/build-static-site.mjs

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
