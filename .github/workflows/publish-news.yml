name: Generate and publish news archive

on:
  push:
    branches:
      - main
  schedule:
    # Beijing 06:45 and 20:45: prepare reports before their release time.
    - cron: "45 22 * * *"
    - cron: "45 12 * * *"
    # Every 15 minutes: recover any released report missing from the past 14 days.
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch:
    inputs:
      edition:
        description: Report to generate manually
        required: true
        default: morning
        type: choice
        options:
          - morning
          - evening

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: news-pages
  cancel-in-progress: false

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NEWS_DATA_DIR: published-data/news
    steps:
      - name: Check out archive
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Generate finalized report
        shell: bash
        run: |
          generate_with_retry() {
            local command="$1"
            for attempt in 1 2 3; do
              echo "Running ${command} (attempt ${attempt}/3)..."
              if [ "$command" = "catch-up" ]; then
                node generate-report.mjs --backfill --days 14 && return 0
              elif node generate-report.mjs --edition "$command" --prepare; then
                return 0
              fi
              if [ "$attempt" -lt 3 ]; then
                sleep $((attempt * 30))
              fi
            done
            return 1
          }

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            generate_with_retry "${{ inputs.edition }}"
          elif [ "${{ github.event_name }}" = "push" ]; then
            generate_with_retry catch-up
          else
            case "${{ github.event.schedule }}" in
              "45 22 * * *") generate_with_retry morning ;;
              "45 12 * * *") generate_with_retry evening ;;
              "7,22,37,52 * * * *") generate_with_retry catch-up ;;
              *) echo "Unknown schedule"; exit 1 ;;
            esac
          fi

      - name: Commit new finalized archives
        if: always()
        shell: bash
        run: |
          git config user.name "kaoyan-news-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add published-data/news
          if git diff --cached --quiet; then
            echo "No new archive files."
          else
            git commit -m "chore: publish finalized news archive"
            git push
          fi

      - name: Build static site
        run: node scripts/build-static-site.mjs

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
